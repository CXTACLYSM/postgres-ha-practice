services:
  target:
    image: postgres-ha-practice:1.0
    container_name: "target"
    hostname: "target"
    ports:
      - "8080:8080"
    networks:
      - backend
      - persistence
    env_file:
      - .envs/app/services/target/.env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: "postgres_primary"
    hostname: "postgres_primary"
    ports:
      - "5432:5432"
    networks:
      - persistence
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: ha_practice
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d ha_practice"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: "prometheus"
    hostname: "prometheus"
    ports:
      - "9090:9090"
    networks:
      - backend
    volumes:
      # Конфиг с описанием что и как скрейпить
      - ./builds/local/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=1d"
    depends_on:
      - target

  grafana:
    image: grafana/grafana:10.4.2
    container_name: "grafana"
    hostname: "grafana"
    ports:
      - "3000:3000"
    networks:
      - backend
    environment:
      # Отключаем логин-экран для локального эксперимента
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      # Datasource — Grafana автоматически подключится к Prometheus при старте
      - ./builds/local/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus

networks:
  backend:
  persistence: