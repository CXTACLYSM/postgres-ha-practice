# =============================================================================
# HAProxy 2.9 — PostgreSQL Read Load Balancer
# =============================================================================
#
# Роль в архитектуре:
#   ReadPool в Go-сервисе подключается к haproxy:5433
#   HAProxy распределяет входящие TCP-соединения между репликами
#   Приложение не знает о существовании реплик — оно видит один эндпоинт
#
# Топология:
#   Go ReadPool → haproxy:5433 → postgres_replica_1:5432
#                              → postgres_replica_2:5432
#
# HAProxy работает на уровне TCP (Layer 4), а не HTTP (Layer 7).
# Это важно: PostgreSQL использует собственный бинарный протокол,
# и HAProxy просто пробрасывает байты — не читает SQL, не парсит запросы.
# =============================================================================

# -----------------------------------------------------------------------------
# GLOBAL — настройки процесса HAProxy
# -----------------------------------------------------------------------------
global
    # Максимальное число одновременных соединений через HAProxy
    # 500 достаточно для лабораторного эксперимента
    maxconn 500

    # Логи пишем в stdout — удобно для docker logs
    log stdout format raw local0 info

# -----------------------------------------------------------------------------
# DEFAULTS — применяются ко всем frontend и backend если не переопределены
# -----------------------------------------------------------------------------
defaults
    # mode tcp — HAProxy работает на уровне L4 (Transport Layer)
    # Он не знает что внутри TCP-потока — PostgreSQL, Redis или что-то ещё
    # Просто пробрасывает байты от клиента к серверу и обратно
    mode tcp

    # Логировать каждое соединение — полезно при отладке
    log global
    option tcplog

    # Таймауты — сколько HAProxy ждёт перед тем как разорвать соединение
    # connect: время на установку TCP-соединения с бэкендом (репликой)
    # client:  время простоя на стороне клиента (Go ReadPool)
    # server:  время простоя на стороне сервера (реплика PostgreSQL)
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# -----------------------------------------------------------------------------
# FRONTEND — точка входа куда подключается Go ReadPool
# -----------------------------------------------------------------------------
frontend postgres_read
    # Слушаем на всех интерфейсах на порту 5433
    bind *:5433

    # Передаём все входящие соединения в backend postgres_replicas
    default_backend postgres_replicas

# -----------------------------------------------------------------------------
# BACKEND — пул реплик куда HAProxy распределяет соединения
# -----------------------------------------------------------------------------
backend postgres_replicas
    # balance roundrobin — каждое новое соединение идёт на следующую реплику
    # Соединение 1 → replica_1, соединение 2 → replica_2, соединение 3 → replica_1, ...
    # Это означает что при MaxConns=25 в ReadPool:
    #   ~12-13 соединений будут на replica_1
    #   ~12-13 соединений будут на replica_2
    # Итого ~50 слотов вместо 25 — именно это устраняет connection exhaustion
    balance roundrobin

    # option tcp-check — проверяем что бэкенд жив через TCP-соединение
    # HAProxy пытается установить TCP-соединение к реплике каждые interval секунд
    # Если соединение не устанавливается — бэкенд помечается как DOWN
    # и HAProxy перестаёт направлять на него новые соединения
    option tcp-check

    # Параметры health check:
    # inter:  интервал между проверками
    # rise:   сколько успешных проверок подряд чтобы считать бэкенд UP
    # fall:   сколько неуспешных проверок подряд чтобы считать бэкенд DOWN
    default-server inter 3s rise 2 fall 3

    # Бэкенды — реплики PostgreSQL
    # Имена хостов совпадают с hostname в compose.ha.yml
    # check — включает health check для этого сервера
    server replica_1 postgres_replica_1:5432 check
    server replica_2 postgres_replica_2:5432 check

# -----------------------------------------------------------------------------
# STATS — веб-интерфейс для наблюдения за балансировкой
# -----------------------------------------------------------------------------
# Открой http://localhost:8404/stats во время нагрузочного теста
# Там видно: сколько соединений прошло через каждую реплику,
# статус health check (зелёный = UP, красный = DOWN),
# и текущее число активных сессий на каждом бэкенде
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
